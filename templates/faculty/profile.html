{% extends "base.html" %}
{% block title %}Profile{% endblock %}
{% block page_title %}My Profile{% endblock %}
{% block content %}
<div class="form-card" style="max-width:600px">
    <h3>👤 Profile</h3>
    <form method="POST">
        <div class="form-group"><label>Full Name</label><input type="text" name="full_name" class="form-control" value="{{ user.full_name }}"></div>
        <div class="form-group"><label>Email</label><input type="email" class="form-control" value="{{ user.email }}" readonly></div>
        <div class="form-group"><label>Phone</label><input type="text" name="phone" class="form-control" value="{{ user.phone or '' }}"></div>
        <div class="form-group"><label>Designation</label><input type="text" name="designation" class="form-control" value="{{ user.designation or '' }}"></div>
        <div class="form-group"><label>Department</label><input type="text" class="form-control" value="{{ user.department }}" readonly></div>
        <button type="submit" class="btn btn-primary mt-2"><i class="bi bi-check-lg"></i> Update Profile</button>
    </form>
</div>
{% endblock %}
