{% extends "base.html" %}
{% block title %}{{ 'Edit' if edit else 'Add' }} Student{% endblock %}
{% block page_title %}{{ 'Edit' if edit else 'Add New' }} Student{% endblock %}
{% block content %}
<div class="form-card" style="max-width:700px">
    <h3>{{ '✏️ Edit Student' if edit else '➕ Add Student' }}</h3>
    <form method="POST" action="{{ '/admin/students/edit/' ~ edit.id if edit else '/admin/students/add' }}">
        <div class="form-row">
            <div class="form-group"><label>Full Name *</label><input type="text" name="full_name" class="form-control" value="{{ edit.full_name if edit else '' }}" required></div>
            <div class="form-group"><label>Username *</label><input type="text" name="username" class="form-control" value="{{ edit.username if edit else '' }}" {% if edit %}readonly{% endif %} required></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>Email *</label><input type="email" name="email" class="form-control" value="{{ edit.email if edit else '' }}" required></div>
            <div class="form-group"><label>Roll Number *</label><input type="text" name="roll_no" class="form-control" value="{{ edit.roll_no if edit else '' }}" required></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>Phone</label><input type="text" name="phone" class="form-control" value="{{ edit.phone if edit else '' }}"></div>
            <div class="form-group"><label>Semester</label><select name="semester" class="form-control">{% for s in semesters %}<option value="{{ s }}" {{ 'selected' if edit and edit.semester == s }}>Semester {{ s }}</option>{% endfor %}</select></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>Batch Year</label><input type="text" name="batch_year" class="form-control" value="{{ edit.batch_year if edit else '' }}" placeholder="e.g. 2022-2026"></div>
            <div class="form-group"><label>Department</label><input type="text" name="department" class="form-control" value="{{ edit.department if edit else 'Computer Science & Machine Learning' }}"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>Password {{ '(leave blank to keep)' if edit else '*' }}</label><input type="password" name="password" class="form-control" {{ '' if edit else 'required' }}></div>
            {% if edit %}<div class="form-group"><label>Status</label><select name="status" class="form-control"><option value="Active" {{ 'selected' if edit.status=='Active' }}>Active</option><option value="Inactive" {{ 'selected' if edit.status=='Inactive' }}>Inactive</option></select></div>{% endif %}
        </div>
        <div style="margin-top:24px;display:flex;gap:12px">
            <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> {{ 'Update' if edit else 'Save' }}</button>
            <a href="/admin/students" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
