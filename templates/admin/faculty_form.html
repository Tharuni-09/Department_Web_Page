{% extends "base.html" %}
{% block title %}{{ 'Edit' if edit else 'Add' }} Faculty{% endblock %}
{% block page_title %}{{ 'Edit' if edit else 'Add New' }} Faculty{% endblock %}
{% block content %}
<div class="form-card" style="max-width:700px">
    <h3>{{ '✏️ Edit Faculty' if edit else '➕ Add Faculty' }}</h3>
    <form method="POST" action="{{ '/admin/faculty/edit/' ~ edit.id if edit else '/admin/faculty/add' }}">
        <div class="form-row">
            <div class="form-group"><label>Full Name *</label><input type="text" name="full_name" class="form-control" value="{{ edit.full_name if edit else '' }}" required></div>
            <div class="form-group"><label>Username *</label><input type="text" name="username" class="form-control" value="{{ edit.username if edit else '' }}" {% if edit %}readonly{% endif %} required></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>Email *</label><input type="email" name="email" class="form-control" value="{{ edit.email if edit else '' }}" required></div>
            <div class="form-group"><label>Phone</label><input type="text" name="phone" class="form-control" value="{{ edit.phone if edit else '' }}"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>Department</label><input type="text" name="department" class="form-control" value="{{ edit.department if edit else 'Computer Science & Machine Learning' }}"></div>
            <div class="form-group"><label>Designation</label><input type="text" name="designation" class="form-control" value="{{ edit.designation if edit else '' }}" placeholder="e.g. Assistant Professor"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>Role *</label><select name="role" class="form-control"><option value="faculty" {{ 'selected' if edit and edit.role=='faculty' }}>Faculty</option><option value="hod" {{ 'selected' if edit and edit.role=='hod' }}>HOD</option></select></div>
            <div class="form-group"><label>Password {{ '(leave blank to keep)' if edit else '*' }}</label><input type="password" name="password" class="form-control" {{ '' if edit else 'required' }} placeholder="{{ '••••••••' if edit else 'Enter password' }}"></div>
        </div>
        {% if edit %}
        <div class="form-group"><label>Status</label><select name="status" class="form-control"><option value="Active" {{ 'selected' if edit.status=='Active' }}>Active</option><option value="Inactive" {{ 'selected' if edit.status=='Inactive' }}>Inactive</option></select></div>
        {% endif %}
        <div style="margin-top:24px;display:flex;gap:12px">
            <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> {{ 'Update' if edit else 'Save' }} Faculty</button>
            <a href="/admin/faculty" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
